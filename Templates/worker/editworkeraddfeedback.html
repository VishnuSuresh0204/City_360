{% extends 'worker/commonbase.html' %}
{% load static %}
{% block content %}

<style>
    .edit-feedback-section {
        padding: 80px 0 60px;
        min-height: 80vh;
    }

    .edit-feedback-section h3 {
        font-size: 1.8rem;
        font-weight: 700;
        margin-bottom: 28px;
    }

    .form-card {
        background: #fff;
        border-radius: 14px;
        box-shadow: 0 4px 18px rgba(0, 0, 0, 0.10);
        padding: 36px 40px;
        max-width: 620px;
    }

    .form-card label {
        font-weight: 600;
        margin-bottom: 6px;
        display: block;
        color: #444;
    }

    .form-card .meta-field {
        background: #f8f9fa;
        border: 1.5px solid #e0e0e0;
        border-radius: 8px;
        padding: 10px 16px;
        margin-bottom: 18px;
        color: #666;
        font-size: 0.95rem;
    }

    .form-card textarea {
        width: 100%;
        border: 1.5px solid #ddd;
        border-radius: 8px;
        padding: 12px 16px;
        font-size: 0.95rem;
        resize: vertical;
        min-height: 120px;
        outline: none;
        transition: border-color 0.2s;
    }

    .form-card textarea:focus {
        border-color: #6a82fb;
    }

    .btn-save {
        background: linear-gradient(135deg, #6a82fb, #fc5c7d);
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 11px 32px;
        font-size: 1rem;
        font-weight: 600;
        cursor: pointer;
        margin-top: 18px;
        transition: opacity 0.2s;
    }

    .btn-save:hover {
        opacity: 0.88;
    }

    .btn-back {
        display: inline-block;
        margin-top: 14px;
        margin-left: 12px;
        color: #888;
        text-decoration: none;
        font-size: 0.92rem;
    }

    .btn-back:hover {
        color: #333;
    }
</style>

<section class="edit-feedback-section">
    <div class="container">
        <div class="form-card">
            <h3><i class="fa fa-pencil mr-2"></i>Edit Your Feedback</h3>
            <label>User</label>
            <div class="meta-field">{{ fb.usrid.name }}</div>
            <label>Booking Category</label>
            <div class="meta-field">{{ fb.booking.category }}</div>

            <form method="POST" action="/editworkeraddfeedback/?id={{ fb.id }}">
                {% csrf_token %}
                <label for="feedbackText">Your Feedback</label>
                <textarea id="feedbackText" name="Feedback" required>{{ fb.feedback }}</textarea>
                <div>
                    <button type="submit" class="btn-save"><i class="fa fa-save mr-1"></i> Save Changes</button>
                    <a class="btn-back" href="/workerviewfeedback"><i class="fa fa-arrow-left mr-1"></i>Cancel</a>
                </div>
            </form>
        </div>
    </div>
</section>

{% endblock %}
