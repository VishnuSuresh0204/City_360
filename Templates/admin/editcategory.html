{% extends 'admin/commonbase.html' %}
{% load static %}
{% block content %}

<style>
    .edit-form-container {
        max-width: 600px;
        margin: 50px auto;
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        border: 1px solid #eee;
    }

    .form-title {
        font-weight: 800;
        color: #2c3e50;
        margin-bottom: 30px;
        text-align: center;
        position: relative;
        padding-bottom: 15px;
    }

    .form-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 4px;
        background: #3498db;
        border-radius: 2px;
    }

    .form-group label {
        font-weight: 600;
        color: #444;
        margin-bottom: 10px;
    }

    .form-control {
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #ddd;
        transition: border-color 0.3s ease;
    }

    .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }

    .current-image {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 15px;
        border: 1px solid #eee;
    }

    .btn-update {
        background: #3498db;
        color: #fff;
        font-weight: 700;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        margin-top: 20px;
        transition: background 0.3s ease;
    }

    .btn-update:hover {
        background: #2980b9;
        color: #fff;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #7f8c8d;
        font-weight: 600;
    }

    .back-link:hover {
        color: #34495e;
    }
</style>

<div class="container">
    <div class="edit-form-container">
        <h3 class="form-title">Edit Category</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mb-4">
                <label for="category">Category Name</label>
                <input type="text" name="category" id="category" class="form-control" value="{{ i.category }}" required>
            </div>

            <div class="form-group mb-4">
                <label>Current Image</label>
                <br>
                <img src="/static/assets/image/{{ i.image }}" alt="{{ i.category }}" class="current-image">
            </div>

            <div class="form-group mb-4">
                <label for="image">Change Image (Optional)</label>
                <input type="file" name="image" id="image" class="form-control-file">
            </div>

            <button type="submit" class="btn btn-update">Update Category</button>
            <a href="/viewcategory" class="back-link"><i class="fa fa-arrow-left mr-1"></i> Back to Categories</a>
        </form>
    </div>
</div>

{% endblock %}
