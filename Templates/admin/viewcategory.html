{% extends 'admin/commonbase.html' %}
{% load static %}
{% block content %}

<style>
    .category-card {
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        overflow: hidden;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        margin-bottom: 30px;
        border: 1px solid #eee;
    }

    .category-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.12);
    }

    .category-image-container {
        height: 200px;
        position: relative;
        overflow: hidden;
    }

    .category-image-container img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .category-info {
        padding: 25px;
        text-align: center;
    }

    .category-name {
        font-size: 1.4rem;
        font-weight: 800;
        margin-bottom: 15px;
        color: #2c3e50;
    }

    .card-actions {
        display: flex;
        gap: 10px;
        padding: 0 25px 25px;
    }

    .card-actions .btn {
        flex: 1;
        font-weight: 700;
        padding: 10px;
        border-radius: 8px;
        font-size: 0.9rem;
    }

    .section-title {
        position: relative;
        padding-bottom: 15px;
        margin-bottom: 40px;
        font-weight: 800;
        color: #2c3e50;
    }

    .section-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 4px;
        background: #3498db;
        border-radius: 2px;
    }

    .add-category-btn {
        background: #3498db;
        color: #fff;
        font-weight: 700;
        padding: 12px 25px;
        border-radius: 30px;
        display: inline-block;
        margin-bottom: 30px;
        transition: background 0.3s ease;
    }

    .add-category-btn:hover {
        background: #2980b9;
        color: #fff;
        box-shadow: 0 5px 15px rgba(52, 152, 219, 0.3);
    }
</style>

<section class="w3l-team py-5" id="categories">
    <div class="container py-lg-5">
        <div class="text-center mb-5">
            <h3 class="title-style section-title">Manage Service Categories</h3>
            <a href="/addcategory" class="add-category-btn">
                <i class="fa fa-plus mr-1"></i> Add New Category
            </a>
        </div>

        <div class="row">
            {% for i in abc %}
            <div class="col-lg-4 col-md-6 col-sm-12">
                <div class="category-card">
                    <div class="category-image-container">
                        <img src="/static/assets/image/{{i.image}}" alt="{{ i.category }}">
                    </div>
                    <div class="category-info">
                        <div class="category-name">{{ i.category }}</div>
                    </div>
                    <div class="card-actions">
                        <a href="/editcategory?id={{i.id}}" class="btn btn-info">
                            <i class="fa fa-edit mr-1"></i> Edit
                        </a>
                        <a href="/deletecategory?id={{i.id}}" class="btn btn-outline-danger"
                            onclick="return confirm('Are you sure you want to delete this category?')">
                            <i class="fa fa-trash mr-1"></i> Delete
                        </a>
                    </div>
                </div>
            </div>
            {% empty %}
            <div class="col-12 text-center text-muted py-5">
                <p>No categories found. Add one to get started.</p>
            </div>
            {% endfor %}
        </div>
    </div>
</section>

{% endblock %}
