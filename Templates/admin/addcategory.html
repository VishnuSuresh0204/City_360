{% extends 'admin/commonbase.html' %}
{% load static %}
{% block content %}

<style>
    .add-form-container {
        max-width: 600px;
        margin: 50px auto;
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1);
        border: 1px solid #eee;
    }

    .form-title {
        font-weight: 800;
        color: #2c3e50;
        margin-bottom: 30px;
        text-align: center;
        position: relative;
        padding-bottom: 15px;
    }

    .form-title::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 50%;
        transform: translateX(-50%);
        width: 50px;
        height: 4px;
        background: #3498db;
        border-radius: 2px;
    }

    .form-group label {
        font-weight: 600;
        color: #444;
        margin-bottom: 10px;
    }

    .form-control {
        border-radius: 8px;
        padding: 12px;
        border: 1px solid #ddd;
        transition: border-color 0.3s ease;
    }

    .form-control:focus {
        border-color: #3498db;
        box-shadow: 0 0 0 0.2rem rgba(52, 152, 219, 0.25);
    }

    .upload-box {
        border: 2px dashed #ddd;
        border-radius: 10px;
        padding: 30px;
        text-align: center;
        cursor: pointer;
        transition: border-color 0.3s ease, background 0.3s ease;
        margin-bottom: 15px;
    }

    .upload-box:hover {
        border-color: #3498db;
        background: #fcfcfc;
    }

    #preview-img {
        max-width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
        margin-bottom: 15px;
        display: none;
    }

    .upload-icon {
        font-size: 2.5rem;
        color: #3498db;
        margin-bottom: 10px;
    }

    .btn-add {
        background: #3498db;
        color: #fff;
        font-weight: 700;
        padding: 12px;
        border-radius: 8px;
        width: 100%;
        margin-top: 20px;
        transition: background 0.3s ease;
        border: none;
    }

    .btn-add:hover {
        background: #2980b9;
        color: #fff;
    }

    .back-link {
        display: block;
        text-align: center;
        margin-top: 20px;
        color: #7f8c8d;
        font-weight: 600;
        text-decoration: none;
    }

    .back-link:hover {
        color: #34495e;
    }

    #file-input {
        display: none;
    }
</style>

<div class="container">
    <div class="add-form-container">
        <h3 class="form-title">Add New Category</h3>
        <form method="post" enctype="multipart/form-data">
            {% csrf_token %}
            <div class="form-group mb-4">
                <label for="Category">Category Name</label>
                <input type="text" name="Category" id="Category" class="form-control"
                    placeholder="e.g. Electrician, Plumber" required>
            </div>

            <div class="form-group mb-4">
                <label>Category Image</label>
                <div class="upload-box" onclick="document.getElementById('file-input').click()">
                    <img id="preview-img" src="#" alt="Preview">
                    <div id="upload-placeholder">
                        <div class="upload-icon"><i class="fa fa-cloud-upload"></i></div>
                        <p class="mb-0 text-muted">Click to upload category icon</p>
                    </div>
                </div>
                <input id="file-input" onchange="readURL(this)" name="image" type="file" required>
            </div>

            <button type="submit" class="btn btn-add shadow-sm">Add Category</button>
            <a href="/viewcategory" class="back-link"><i class="fa fa-arrow-left mr-1"></i> Back to Categories</a>
        </form>
    </div>
</div>

<script>
    function readURL(input) {
        if (input.files && input.files[0]) {
            var reader = new FileReader();

            reader.onload = function (e) {
                document.getElementById('preview-img').src = e.target.result;
                document.getElementById('preview-img').style.display = 'inline-block';
                document.getElementById('upload-placeholder').style.display = 'none';
            };

            reader.readAsDataURL(input.files[0]);
        }
    }
</script>

{% endblock %}
